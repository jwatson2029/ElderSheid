# Packages the ElderSafe Chrome extension as a Web Store–ready ZIP (manifest at root).
# Download: Actions tab → workflow run → Artifacts → eldersafe-extension.zip

name: Package extension

on:
  push:
    branches: [main, master]
    paths:
      - 'eldersafe-extension/**'
      - '.github/workflows/package-extension.yml'
  pull_request:
    paths:
      - 'eldersafe-extension/**'
      - '.github/workflows/package-extension.yml'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create ZIP (Chrome-ready layout)
        id: pack
        run: |
          set -euo pipefail
          VERSION="$(jq -r '.version' eldersafe-extension/manifest.json)"
          OUT="eldersafe-extension-v${VERSION}.zip"
          # Zip CONTENTS of eldersafe-extension so manifest.json is at the root (not eldersafe-extension/manifest.json).
          (cd eldersafe-extension && zip -r "../${OUT}" . \
            -x '*.git*' \
            -x '**/.DS_Store' \
            -x 'test-fixtures/*' \
            -x 'store-assets/*' \
            -x 'package-webstore.sh')
          echo "zip_path=${OUT}" >> "${GITHUB_OUTPUT}"
          ls -la "$OUT"

      - name: Verify manifest.json at ZIP root
        run: |
          OUT="${{ steps.pack.outputs.zip_path }}"
          python3 << 'PY'
          import sys, zipfile
          path = "${{ steps.pack.outputs.zip_path }}"
          with zipfile.ZipFile(path, "r") as z:
              for n in z.namelist():
                  parts = [p for p in n.replace("\\", "/").lstrip("./").split("/") if p]
                  if parts == ["manifest.json"]:
                      print("OK: manifest at zip root:", n)
                      sys.exit(0)
              print("ERROR: manifest.json must be at root of the zip (not inside a subfolder).", file=sys.stderr)
              print("Entries:", z.namelist()[:30], file=sys.stderr)
              sys.exit(1)
          PY

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: eldersafe-extension-zip
          path: ${{ steps.pack.outputs.zip_path }}
          if-no-files-found: error

      - name: Summary — where to download
        run: |
          {
            echo '### ElderSafe extension package'
            echo ''
            echo '**Chrome Web Store:** GitHub wraps the file in a second zip. **Extract** the downloaded artifact, then upload the **inner** file `eldersafe-extension-v*.zip`.'
            echo 'Do **not** upload the GitHub artifact zip itself — it has no `manifest.json` at root (only a nested zip).'
            echo ''
            echo '**Download:** this run → **Artifacts** → **eldersafe-extension-zip** → extract → upload **`eldersafe-extension-v*.zip`**.'
          } >> "$GITHUB_STEP_SUMMARY"
